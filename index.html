<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Zesto — Admin Panel</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig={databaseURL:"https://saphau-food-default-rtdb.firebaseio.com/",projectId:"318798322657"};
  const app=firebase.initializeApp(firebaseConfig);const db=firebase.database();
</script>
<style>
:root{
  --primary:#7cbf5c;--bg:#F6F6F6;--surface:#FFFFFF;--line:#E2E8D9;--muted:#6B7280;
  --accent:#7cbf5c;--accentText:#FFFFFF;--success:#18A957;--radius:16px;
  --shadow:0 1px 2px rgba(10,10,10,.06),0 8px 24px rgba(10,10,10,.05);
  --shadow-sm:0 1px 3px rgba(10,10,10,.08);
  --safe:env(safe-area-inset-bottom,0px);
  --accentLight:#e8f5e0;--accentDark:#5a9a3e;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:#111;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;line-height:1.4;font-size:14px}
img{max-width:100%;display:block}
button{font:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;z-index:20;background:#fff;backdrop-filter:saturate(120%) blur(6px);border-bottom:1px solid var(--line)}
.topbar-inner{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;max-width:1100px;margin:0 auto}
.topbar-logo{height:36px;width:auto;border-radius:8px;flex-shrink:0}
.title{font-family:Poppins,sans-serif;font-size:20px;font-weight:700;margin:0;color:var(--accentDark)}
.icon-round{width:36px;height:36px;border-radius:999px;border:1px solid var(--line);background:#fff;display:inline-grid;place-items:center;color:#111;box-shadow:var(--shadow-sm)}
.admin-wrap{max-width:1100px;margin:0 auto;padding:16px;padding-bottom:120px}
.admin-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-weight:700;border:none;border-radius:14px;padding:12px 16px;background:var(--accent);color:var(--accentText);font-size:14px;transition:background .2s}
.btn:hover{background:var(--accentDark)}
.btn:active{transform:translateY(1px)}
.btn-outline{background:#fff;color:#111;border:1px solid var(--line)}
.btn-outline:hover{background:var(--accentLight);border-color:var(--accent)}
.btn-block{width:100%}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-danger{background:#E11D48;color:#fff;border:1px solid #E11D48}
.btn-danger:hover{background:#be123c}
.btn-success{background:var(--success);color:#fff;border:1px solid var(--success)}
.muted{color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px}
input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,191,92,.15)}
textarea{min-height:80px;resize:vertical}
label{font-size:13px;color:#111;margin:8px 0 4px;display:block;font-weight:600}
.row{display:flex;align-items:center;justify-content:space-between}
.sep{height:1px;background:var(--line);margin:10px 0}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th,.table td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
.table th{background:var(--accentLight);font-weight:700;color:var(--accentDark);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.dropzone{border:2px dashed var(--accent);border-radius:14px;padding:18px;text-align:center;background:var(--accentLight);color:var(--accentDark);cursor:pointer;transition:background .2s}
.dropzone:hover{background:#d4edca}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.thumb{width:72px;height:72px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover}
.review-stars{color:#FFD700;font-size:14px}
.review-stars .empty{color:#ddd}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--accentDark);color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.toast.show{opacity:1}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-card .stat-num{font-size:28px;font-weight:700;font-family:Poppins;color:var(--accent)}
.stat-card .stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.order-detail-card{background:var(--accentLight);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
.order-detail-card h4{margin:0 0 8px;font-family:Poppins;font-size:14px;color:var(--accentDark)}
.map-container{width:100%;height:200px;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-top:8px}
#admin-view{display:none}
.nav-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}
@media(min-width:600px){.nav-grid{grid-template-columns:repeat(4,1fr)}}
.nav-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;transition:box-shadow .2s,transform .2s;text-align:center}
.nav-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--accent)}
.nav-card i{font-size:28px;color:var(--accent)}
.nav-card span{font-weight:600;font-size:13px}
.del-status-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.del-status-chip.unassigned{background:#FFF7E6;color:#D97706;border:1px solid #FFE0A3}
.del-status-chip.accepted{background:#E0F2FE;color:#0284C7;border:1px solid #BAE6FD}
.del-status-chip.picked{background:#F3E8FF;color:#7C3AED;border:1px solid #DDD6FE}
.del-status-chip.delivered{background:#E6F7EE;color:#18A957;border:1px solid #CFF7DF}
.earning-box{background:var(--accentLight);border:1px solid var(--accent);border-radius:10px;padding:12px;text-align:center;}
.earning-box .amt{font-size:22px;font-weight:bold;color:var(--accentDark);font-family:Poppins}
.earning-box .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.payout-preset{cursor:pointer;transition:all 0.2s;}
.payout-preset:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <button id="admin-back" class="icon-round" aria-label="Back" style="display:none" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <img id="admin-logo" class="topbar-logo" src="" alt="Zesto" style="display:none">
    <h1 id="admin-title" class="title"><i class="fa-solid fa-shield-halved" style="color:var(--accent)"></i> Admin Panel</h1>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" id="admin-logout" style="display:none"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </div>
</header>

<div class="admin-wrap">
  <div id="admin-login" class="admin-card" style="max-width:480px;margin:40px auto">
    <div style="text-align:center;margin-bottom:16px">
      <div style="width:64px;height:64px;border-radius:999px;background:var(--accentLight);display:grid;place-items:center;margin:0 auto 10px"><i class="fa-solid fa-lock" style="font-size:28px;color:var(--accent)"></i></div>
      <h2 style="margin:0;font-family:Poppins;color:var(--accentDark)">Admin Login</h2>
    </div>
    <form id="admin-login-form" autocomplete="off">
      <label>Admin ID</label><input id="adm-id" type="text" placeholder="Admin ID" required>
      <label>Password</label><input id="adm-pw" type="password" placeholder="Password" required>
      <div style="margin-top:14px"><button class="btn btn-block" type="submit"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button></div>
    </form>
  </div>
  <div id="admin-view"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const ADMIN_ID="Madhav@store";const ADMIN_PW="Madhav@1234";
const $=s=>document.querySelector(s);const $$=s=>Array.from(document.querySelectorAll(s));
const money=n=>'\u20B9'+(n||0).toLocaleString("en-IN");
const uid=()=>'p_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
const escapeHtml=(s="")=>s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
const toast=msg=>{const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)};
const routeTo=hash=>{location.hash=hash};
function renderStarIcons(r,max=5){let h='';for(let i=1;i<=max;i++)h+=i<=r?'<i class="fa-solid fa-star"></i>':'<i class="fa-solid fa-star empty"></i>';return h}

let PRODUCTS=[],ORDERS=[],CUSTOMERS=[],RATINGS=[],DELIVERY_APPS=[];
let HERO_IMAGE_URL="",BANNER_TEXT="",APP_LOGO_URL="";
let CONFIG={};
let IS_AUTHED=sessionStorage.getItem("sf_admin_auth")==="1";

const productsRef=db.ref('products');const ordersRef=db.ref('orders');const ratingsRef=db.ref('ratings');
const configRef=db.ref('config');const deliveryRef=db.ref('deliveryApplications');

productsRef.on('value',s=>{PRODUCTS=s.val()?Object.values(s.val()):[];PRODUCTS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));tryRender()});
ordersRef.on('value',s=>{ORDERS=s.val()?Object.values(s.val()):[];ORDERS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));rebuildCustomers();tryRender()});
ratingsRef.on('value',s=>{RATINGS=s.val()?Object.values(s.val()):[];tryRender()});
configRef.on('value',s=>{
  CONFIG = s.val()||{};
  HERO_IMAGE_URL=CONFIG.heroImage||"";BANNER_TEXT=CONFIG.bannerText||"";APP_LOGO_URL=CONFIG.appLogo||"";
  if(APP_LOGO_URL){$("#admin-logo").src=APP_LOGO_URL;$("#admin-logo").style.display="block"}else{$("#admin-logo").style.display="none"}
  tryRender()});
deliveryRef.on('value',s=>{DELIVERY_APPS=s.val()?Object.values(s.val()):[];DELIVERY_APPS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));tryRender()});

function rebuildCustomers(){
  const map={};
  for(const o of ORDERS){const k=(o.customer?.email||o.customer?.phone||"").toLowerCase();if(!k)continue;if(!map[k])map[k]={key:k,name:o.customer?.name||"",email:o.customer?.email||"",phone:o.customer?.phone||"",orders:0,total:0,last:0};map[k].orders++;map[k].total+=o.amount||0;map[k].last=Math.max(map[k].last,o.createdAt||0)}
  CUSTOMERS=Object.values(map).sort((a,b)=>b.last-a.last);
}
function tryRender(){if(IS_AUTHED)render()}

$("#admin-login-form").addEventListener("submit",e=>{
  e.preventDefault();
  if($("#adm-id").value.trim().toLowerCase()===ADMIN_ID.toLowerCase()&&$("#adm-pw").value.trim()===ADMIN_PW){
    IS_AUTHED=true;sessionStorage.setItem("sf_admin_auth","1");
    $("#admin-login").style.display="none";$("#admin-view").style.display="block";$("#admin-logout").style.display="inline-flex";render();
  }else alert("Invalid credentials.");
});
$("#admin-logout").addEventListener("click",()=>{IS_AUTHED=false;sessionStorage.removeItem("sf_admin_auth");location.reload()});
if(IS_AUTHED){$("#admin-login").style.display="none";$("#admin-view").style.display="block";$("#admin-logout").style.display="inline-flex"}
window.addEventListener("hashchange",render);

function render(){
  if(!IS_AUTHED)return;
  const h=location.hash.replace(/^#\/?/,"");const parts=h.split("/").filter(Boolean);
  const page=parts[0]||"dashboard";const sub=parts[1]||"";
  $("#admin-back").style.display=page==="dashboard"?"none":"inline-grid";
  if(page==="dashboard")renderDashboard();
  else if(page==="settings")renderSettings();
  else if(page==="banners")renderBanners();
  else if(page==="add")renderAddProduct();
  else if(page==="products")renderProducts();
  else if(page==="orders"&&sub)renderOrderDetail(sub);
  else if(page==="orders")renderOrders();
  else if(page==="customers")renderCustomers();
  else if(page==="delivery"&&sub)renderDeliveryDetail(sub);
  else if(page==="delivery")renderDeliveryApps();
  else if(page==="reviews")renderReviews();
  else renderDashboard();
}

function getDeliveryStats(email){
  if(!email)return{accepted:0,pickedUp:0,delivered:0,total:0, orders:[]};
  const e=email.toLowerCase();
  const myOrders=ORDERS.filter(o=>o.deliveryBoy&&o.deliveryBoy.email&&o.deliveryBoy.email.toLowerCase()===e);
  return{
      accepted:myOrders.filter(o=>o.deliveryStatus==='Accepted').length,
      pickedUp:myOrders.filter(o=>o.deliveryStatus==='Picked Up').length,
      delivered:myOrders.filter(o=>o.deliveryStatus==='Delivered').length,
      total:myOrders.length,
      orders: myOrders
  };
}

function renderDashboard(){
  $("#admin-title").innerHTML='<i class="fa-solid fa-shield-halved" style="color:var(--accent)"></i> Dashboard';
  const totalRevenue=ORDERS.reduce((a,o)=>a+(o.amount||0),0);
  const pendingOrders=ORDERS.filter(o=>!o.status?.includes("Delivered")&&!o.status?.includes("Cancelled")).length;
  const approvedDrivers=DELIVERY_APPS.filter(a=>a.status==='Approved').length;
  
  // Store status logic
  const storeStatus = CONFIG.storeLocked ? 
      '<span style="color:#E11D48;font-weight:700"><i class="fa-solid fa-lock"></i> CLOSED</span>' : 
      '<span style="color:var(--success);font-weight:700"><i class="fa-solid fa-door-open"></i> OPEN</span>';

  $("#admin-view").innerHTML=`
    <div class="admin-card row" style="padding:12px 16px;">
       <div><strong>Store Status:</strong> ${storeStatus}</div>
       <a class="btn btn-sm btn-outline" href="#/settings">Change Settings</a>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${PRODUCTS.length}</div><div class="stat-label">Products</div></div>
      <div class="stat-card"><div class="stat-num">${ORDERS.length}</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-num">${pendingOrders}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num">${money(totalRevenue)}</div><div class="stat-label">Revenue</div></div>
      <div class="stat-card"><div class="stat-num">${CUSTOMERS.length}</div><div class="stat-label">Customers</div></div>
      <div class="stat-card"><div class="stat-num">${approvedDrivers}/${DELIVERY_APPS.length}</div><div class="stat-label">Delivery Boys</div></div>
    </div>
    <div class="nav-grid">
      <a class="nav-card" href="#/settings"><i class="fa-solid fa-gear"></i><span>Settings & Config</span></a>
      <a class="nav-card" href="#/banners"><i class="fa-solid fa-images"></i><span>Banners & Hero</span></a>
      <a class="nav-card" href="#/add"><i class="fa-solid fa-plus-circle"></i><span>Add Product</span></a>
      <a class="nav-card" href="#/products"><i class="fa-solid fa-boxes-stacked"></i><span>Products</span></a>
      <a class="nav-card" href="#/orders"><i class="fa-solid fa-receipt"></i><span>Orders</span></a>
      <a class="nav-card" href="#/customers"><i class="fa-solid fa-users"></i><span>Customers</span></a>
      <a class="nav-card" href="#/delivery"><i class="fa-solid fa-motorcycle"></i><span>Delivery Partners</span></a>
      <a class="nav-card" href="#/reviews"><i class="fa-solid fa-star"></i><span>Reviews</span></a>
    </div>`;
}

function renderSettings(){
  $("#admin-title").textContent="Settings & Configuration";
  
  $("#admin-view").innerHTML=`
    <div class="admin-card" style="${CONFIG.storeLocked ? 'border:2px solid #E11D48; background:#FFF0F2' : 'border:2px solid var(--success); background:#F0FDF4'}">
      <h3 style="margin:0 0 12px;font-family:Poppins;"><i class="fa-solid fa-store"></i> Store Lock (Open/Close)</h3>
      <p class="muted" style="margin:0 0 12px;font-size:13px">Turn off the store at night or when you are not accepting orders. Users will not be able to checkout.</p>
      <select id="cfg-lock" style="max-width:300px; font-weight:bold;">
         <option value="open" ${!CONFIG.storeLocked ? 'selected' : ''}>🟢 Store is OPEN</option>
         <option value="locked" ${CONFIG.storeLocked ? 'selected' : ''}>🔴 Store is CLOSED (Locked)</option>
      </select>
      <div style="margin-top:10px;"><button class="btn btn-sm" id="save-lock">Update Status</button></div>
    </div>

    <div class="admin-card">
      <h3 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-map-location-dot"></i> Delivery Partner Payouts</h3>
      <p class="muted" style="margin:0 0 12px;font-size:13px">Set distance-based earnings for your delivery boys. This amount goes to their digital wallet per delivery.</p>
      <div class="row" style="gap:10px; flex-wrap:wrap;">
         <div style="flex:1"><label>0 to 2 km (\u20B9)</label><input id="dp-fee-1" type="number" value="${CONFIG.payout_0_2 || 20}"></div>
         <div style="flex:1"><label>2 to 5 km (\u20B9)</label><input id="dp-fee-2" type="number" value="${CONFIG.payout_2_5 || 40}"></div>
         <div style="flex:1"><label>5 to 10 km (\u20B9)</label><input id="dp-fee-3" type="number" value="${CONFIG.payout_5_10 || 60}"></div>
      </div>
      <div style="margin-top:10px;"><button class="btn btn-sm" id="save-dp-fees">Save Payout Rules</button></div>
    </div>

    <div class="admin-card">
      <h3 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-city"></i> App Allowed Cities</h3>
      <p class="muted" style="margin:0 0 12px;font-size:13px">Enter comma-separated cities where Zesto is active.</p>
      <input id="cfg-cities" type="text" placeholder="E.g. Jaipur, Delhi, Mumbai" value="${escapeHtml(CONFIG.allowedCities || 'Jaipur, Delhi, Mumbai')}">
      <button class="btn btn-sm" id="cfg-save-cities" style="margin-top:10px"><i class="fa-solid fa-save"></i> Save Cities</button>
    </div>

    <div class="admin-card">
      <h3 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-palette"></i> App Logo</h3>
      <div class="dropzone" id="logo-dz"><i class="fa-solid fa-cloud-arrow-up" style="font-size:24px"></i><div style="font-weight:700;margin-top:6px">Click to upload logo</div></div>
      <input id="logo-upload" type="file" accept="image/*" style="display:none">
      <div class="thumbs" id="logo-thumbs">${APP_LOGO_URL?`<div class="thumb" style="width:96px;height:96px"><img src="${APP_LOGO_URL}"></div>`:''}</div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" id="logo-save"><i class="fa-solid fa-save"></i> Save Logo</button>
        <button class="btn btn-danger" id="logo-remove"><i class="fa-solid fa-trash"></i> Remove</button>
      </div>
    </div>`;

  // Store Lock Setup
  $("#save-lock").addEventListener("click", () => {
     const locked = $("#cfg-lock").value === 'locked';
     db.ref('config/storeLocked').set(locked).then(()=>{
         toast(locked ? "Store is now CLOSED!" : "Store is now OPEN!");
         renderSettings();
     });
  });

  // Delivery Boy Fees Setup
  $("#save-dp-fees").addEventListener("click", () => {
      db.ref('config').update({
          payout_0_2: Number($("#dp-fee-1").value),
          payout_2_5: Number($("#dp-fee-2").value),
          payout_5_10: Number($("#dp-fee-3").value)
      }).then(() => toast("Delivery Payouts Updated!"));
  });

  // Cities Setup
  $("#cfg-save-cities").addEventListener("click", () => {
     db.ref('config/allowedCities').set($("#cfg-cities").value.trim()).then(()=>toast("Cities updated!"));
  });

  // Logo Setup
  $("#logo-dz").addEventListener("click",()=>$("#logo-upload").click());
  $("#logo-upload").addEventListener("change",async e=>{const f=e.target.files[0];if(!f)return;const d=await compressToDataURL(f,400,400,.9);$("#logo-thumbs").innerHTML=`<div class="thumb" style="width:96px;height:96px"><img src="${d}"></div>`;$("#logo-upload").dataset.pending=d});
  $("#logo-save").addEventListener("click",async()=>{
    const pending=$("#logo-upload").dataset.pending;
    if(!pending&&!$("#logo-upload").files[0]){
      if(APP_LOGO_URL){toast("Logo already saved.");return}
      alert("Please select a logo image.");return;
    }
    const d=pending||await compressToDataURL($("#logo-upload").files[0],400,400,.9);
    db.ref('config/appLogo').set(d).then(()=>toast("Logo saved!")).catch(()=>alert("Failed."));
  });
  $("#logo-remove").addEventListener("click",()=>{
    if(confirm("Remove the app logo?")){
      db.ref('config/appLogo').set("").then(()=>{toast("Logo removed!");$("#logo-thumbs").innerHTML="";delete $("#logo-upload").dataset.pending}).catch(()=>alert("Failed."));
    }
  });
}

function renderBanners(){
  $("#admin-title").textContent="Banners & Hero";
  $("#admin-view").innerHTML=`

let pendingUploads=[];let editingProductId=null;
function renderAddProduct(product=null){
  const p=product||{};editingProductId=p.id||null;pendingUploads=p.imageUrls?p.imageUrls.slice():[];
  $("#admin-title").textContent=editingProductId?"Edit Product":"Add Product";
  
  // Dynamic City-Wise Pricing Inputs
  const cities = (CONFIG.allowedCities || "Jaipur,Delhi,Mumbai").split(',').map(s=>s.trim());
  let cityInputsHtml = cities.map(c => {
      const cp = (p.cityPricing && p.cityPricing[c]) ? p.cityPricing[c] : {};
      return `
      <div class="city-pricing-row" data-city-name="${escapeHtml(c)}" style="border:1px solid var(--line); padding:12px; border-radius:10px; margin-bottom:10px; background:#fafafa;">
          <strong style="color:var(--accentDark); font-size:15px;"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(c)}</strong>
          <div class="row" style="gap:10px; margin-top:8px;">
             <div style="flex:1"><label>MRP</label><input class="c-mrp" type="number" min="0" value="${cp.mrp||''}" placeholder="Optional"></div>
             <div style="flex:1"><label>Discount %</label><input class="c-disc" type="number" min="0" max="99" value="${cp.disc||''}" placeholder="%"></div>
             <div style="flex:1"><label>Sale Price</label><input class="c-price" type="number" min="0" value="${cp.price||''}" placeholder="Override"></div>
          </div>
      </div>`;
  }).join('');

  $("#admin-view").innerHTML=`
    <div class="admin-card">
      <label>Product Name *</label><input id="pf-name" required value="${escapeHtml(p.name||'')}">
      <label>Description</label><textarea id="pf-desc">${escapeHtml(p.description||'')}</textarea>
      <label>Category *</label><input id="pf-category" required value="${escapeHtml(p.category||'')}">
      
      <div class="row" style="gap:10px"><div style="flex:1"><label>Default MRP</label><input id="pf-mrp" type="number" min="0" value="${p.priceMrp||''}"></div><div style="flex:1"><label>Default Discount %</label><input id="pf-disc" type="number" min="0" max="99" value="${p.discountPercent||''}"></div><div style="flex:1"><label>Default Sale Price *</label><input id="pf-price" type="number" min="0" value="${p.price||''}"></div></div>
      
      <h4 style="margin:24px 0 8px; color:var(--accentDark); border-bottom:1px solid var(--line); padding-bottom:6px;">City-Wise Pricing (Advanced)</h4>
      <p class="muted" style="font-size:12px; margin-top:0">Leave these blank if you want the city to use the Default Sale Price above.</p>
      ${cityInputsHtml}

      <label style="margin-top:16px;">Shipping Charge (\u20B9)</label>
      <p class="muted" style="font-size:11px; margin-top:0;">Enter 0 for Free Delivery.</p>
      <input id="pf-shipping" type="number" min="0" value="${p.shipping!==undefined?p.shipping:50}">
      
      <label style="display:flex;align-items:center;gap:8px;margin:20px 0;cursor:pointer;background:#FEE2E2;padding:12px;border-radius:10px;border:1px solid #FECACA;width:fit-content">
        <input type="checkbox" id="pf-out-of-stock" style="width:20px;height:20px;margin:0" ${p.outOfStock ? 'checked' : ''}>
        <span style="font-weight:700;color:#E11D48">Mark as Out of Stock</span>
      </label>

      <label>Product Images *</label>
      <div class="dropzone" id="pf-dz"><i class="fa-solid fa-cloud-arrow-up" style="font-size:24px"></i><div style="font-weight:700;margin-top:6px">Click to upload</div></div>
      <input id="pf-upload" type="file" accept="image/*" multiple style="display:none">
      <div class="thumbs" id="pf-thumbs"></div>
      
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn btn-block" id="pf-save"><i class="fa-solid fa-save"></i> ${editingProductId?'Update Product':'Save Product'}</button>
        <button class="btn btn-outline" id="pf-reset">Reset</button>
      </div>
    </div>`;
  renderThumbs();
  $("#pf-dz").addEventListener("click",()=>$("#pf-upload").click());
  $("#pf-upload").addEventListener("change",async e=>{for(const f of Array.from(e.target.files||[])){pendingUploads.push(await compressToDataURL(f,1200,1200,.85))}renderThumbs()});
  $("#pf-reset").addEventListener("click",()=>{editingProductId=null;pendingUploads=[];renderAddProduct()});
  $("#pf-save").addEventListener("click",saveProduct);
}

function renderThumbs(){const t=$("#pf-thumbs");if(t)t.innerHTML=pendingUploads.map(u=>`<div class="thumb"><img src="${u}"></div>`).join("")}

function saveProduct(){
  const name=$("#pf-name").value.trim();const desc=$("#pf-desc").value.trim();const cat=$("#pf-category").value.trim();
  let mrp=Number($("#pf-mrp").value||0);let disc=Number($("#pf-disc").value||0);let price=Number($("#pf-price").value||0);
  
  let shipStr = $("#pf-shipping").value;
  const ship = shipStr === '' ? 50 : Number(shipStr);

  const outOfStock = $("#pf-out-of-stock").checked;
  
  // Gather City-Wise Pricing
  const cityPricing = {};
  $$(".city-pricing-row").forEach(row => {
      const c = row.dataset.cityName;
      let cmrp = Number(row.querySelector('.c-mrp').value || 0);
      let cdisc = Number(row.querySelector('.c-disc').value || 0);
      let cprice = Number(row.querySelector('.c-price').value || 0);
      
      if(!cprice && cmrp && cdisc) cprice = Math.round(cmrp*(100-cdisc)/100);
      if(!cmrp && cprice && cdisc) cmrp = Math.round(cprice*100/(100-cdisc));
      if(!cdisc && cmrp && cprice) cdisc = Math.max(0, Math.min(99, Math.round((cmrp-cprice)/cmrp*100)));
      
      if (cprice || cmrp) {
          cityPricing[c] = { mrp: cmrp, disc: cdisc, price: cprice };
      }
  });

  if(!price&&mrp&&disc)price=Math.round(mrp*(100-disc)/100);
  if(!mrp&&price&&disc)mrp=Math.round(price*100/(100-disc));
  if(!disc&&mrp&&price)disc=Math.max(0,Math.min(99,Math.round((mrp-price)/mrp*100)));
  
  if(!name||!price||!cat){alert("Please fill Name, Category, and Default Sale Price.");return}
  if(!pendingUploads.length){alert("Upload at least one image.");return}

  const data={
      name, description:desc, category:cat, 
      priceMrp:mrp, discountPercent:disc, price, 
      shipping:ship, imageUrls:pendingUploads.slice(), 
      createdAt:Date.now(), outOfStock, cityPricing
  };

  if(editingProductId){
      const p=PRODUCTS.find(x=>x.id===editingProductId);
      if(p?.firebaseKey){
          db.ref('products/'+p.firebaseKey).update(data).then(()=>{toast("Product Updated!");editingProductId=null;pendingUploads=[];routeTo("#/products")})
      }
  } else {
      const k=db.ref('products').push().key;
      db.ref('products/'+k).set({...data,id:uid(),firebaseKey:k}).then(()=>{toast("Product Saved!");pendingUploads=[];renderAddProduct()})
  }
}

function renderDeliveryApps(){
  $("#admin-title").textContent="Delivery Partners";
  $("#admin-view").innerHTML=`
    <div style="display:flex;flex-direction:column;gap:12px">
    ${DELIVERY_APPS.length===0?'<div class="admin-card muted">No applications yet.</div>':DELIVERY_APPS.map(a=>{
      const stats=getDeliveryStats(a.email);
      return`<div class="admin-card" data-key="${a.firebaseKey}">
        <div class="row"><div><div style="font-weight:700;font-size:16px;color:var(--accentDark)">${escapeHtml(a.name)}</div><div class="muted" style="font-size:13px">${escapeHtml(a.email)} | ${escapeHtml(a.phone)}</div></div>
          <div class="chip" style="font-size:12px;${a.status==='Approved'?'background:#E6F7EE;color:#18A957;border-color:#18A957':a.status==='Rejected'?'background:#FEE2E2;color:#E11D48;border-color:#E11D48':''}">${escapeHtml(a.status)}</div>
        </div>
        ${a.status==='Approved'?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0">
          <div style="text-align:center;padding:8px;background:var(--accentLight);border-radius:10px"><div style="font-weight:700;color:var(--accent)">${stats.accepted}</div><div class="muted" style="font-size:11px">Accepted</div></div>
          <div style="text-align:center;padding:8px;background:#F3E8FF;border-radius:10px"><div style="font-weight:700;color:#7C3AED">${stats.pickedUp}</div><div class="muted" style="font-size:11px">Picked Up</div></div>
          <div style="text-align:center;padding:8px;background:#E6F7EE;border-radius:10px"><div style="font-weight:700;color:var(--success)">${stats.delivered}</div><div class="muted" style="font-size:11px">Delivered</div></div>
        </div>`:''}
        <div class="sep"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
          <div><strong>Vehicle:</strong> ${escapeHtml(a.vehicle||'—')}</div>
          <div><strong>Availability:</strong> ${escapeHtml(a.availability||'—')}</div>
          <div><strong>From:</strong> ${escapeHtml(a.deliveryFrom||'—')}</div>
          <div><strong>To:</strong> ${escapeHtml(a.deliveryTo||'—')}</div>
          <div><strong>City:</strong> ${escapeHtml(a.city||'—')}</div>
          <div><strong>License:</strong> ${escapeHtml(a.license||'—')}</div>
        </div>
        ${a.experience?`<div style="margin-top:6px;font-size:13px"><strong>Experience:</strong> ${escapeHtml(a.experience)}</div>`:''}
        <div class="muted" style="font-size:11px;margin-top:6px">Applied: ${new Date(a.createdAt).toLocaleString()}</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <select class="da-status" style="max-width:160px"><option ${a.status==='Pending'?'selected':''}>Pending</option><option ${a.status==='Approved'?'selected':''}>Approved</option><option ${a.status==='Rejected'?'selected':''}>Rejected</option></select>
          <button class="btn btn-sm btn-success da-save"><i class="fa-solid fa-save"></i> Update</button>
          <button class="btn btn-sm btn-danger da-del"><i class="fa-solid fa-trash"></i></button>
          ${a.status==='Approved'?`<button class="btn btn-sm btn-outline da-view" data-email="${escapeHtml(a.email)}"><i class="fa-solid fa-eye"></i> Earnings & Orders</button>`:''}
        </div>
      </div>`}).join('')}
    </div>`;
  $$(".da-save").forEach(btn=>btn.addEventListener("click",(e)=>{const card=e.target.closest("[data-key]");const k=card.dataset.key;const s=card.querySelector(".da-status").value;db.ref('deliveryApplications/'+k).update({status:s}).then(()=>toast("Updated!"))}));
  $$(".da-del").forEach(btn=>btn.addEventListener("click",(e)=>{const card=e.target.closest("[data-key]");if(confirm("Delete this application?")){db.ref('deliveryApplications/'+card.dataset.key).remove().then(()=>toast("Deleted!"))}}));
  $$(".da-view").forEach(btn=>btn.addEventListener("click",(e)=>{const b=e.target.closest(".da-view"); routeTo("#/delivery/"+encodeURIComponent(b.dataset.email))}));
}

function renderDeliveryDetail(email){
  const decodedEmail=decodeURIComponent(email);
  const app=DELIVERY_APPS.find(a=>a.email&&a.email.toLowerCase()===decodedEmail.toLowerCase());
  if(!app){renderDeliveryApps();return}
  $("#admin-title").textContent=app.name+"'s Earnings";
  
  const stats=getDeliveryStats(decodedEmail);
  const myOrders = stats.orders;
  
  const now = new Date();
  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const startOfWeek = startOfDay - (now.getDay() * 86400000);
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

  let todayEarning = 0, weekEarning = 0, monthEarning = 0, totalEarning = 0;

  myOrders.filter(o=>o.deliveryStatus==='Delivered').forEach(o => {
      const payout = o.deliveryPayout !== undefined ? o.deliveryPayout : (o.items ? o.items.reduce((s, it) => s + (typeof it.shipping === 'number' ? it.shipping : 50), 0) : 50);
      
      totalEarning += payout;
      if (o.createdAt >= startOfDay) todayEarning += payout;
      if (o.createdAt >= startOfWeek) weekEarning += payout;
      if (o.createdAt >= startOfMonth) monthEarning += payout;
  });

  const delStatusClass=s=>{if(s==='Delivered')return'delivered';if(s==='Picked Up')return'picked';if(s==='Accepted')return'accepted';return'unassigned'};
  
  $("#admin-view").innerHTML=`
    <div class="admin-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:56px;height:56px;border-radius:999px;background:var(--accentLight);display:grid;place-items:center"><i class="fa-solid fa-motorcycle" style="font-size:24px;color:var(--accent)"></i></div>
        <div><div style="font-weight:700;font-size:18px;color:var(--accentDark)">${escapeHtml(app.name)}</div><div class="muted">${escapeHtml(app.email)} | ${escapeHtml(app.phone)}</div><div class="muted" style="font-size:12px">Zone: ${escapeHtml(app.deliveryFrom||'')} to ${escapeHtml(app.deliveryTo||'')}</div></div>
      </div>
      
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
        <div class="earning-box"><div class="amt">${money(todayEarning)}</div><div class="lbl">Today</div></div>
        <div class="earning-box"><div class="amt">${money(weekEarning)}</div><div class="lbl">This Week</div></div>
        <div class="earning-box"><div class="amt">${money(monthEarning)}</div><div class="lbl">This Month</div></div>
        <div class="earning-box" style="background:#E6F7EE; border-color:var(--success);"><div class="amt" style="color:var(--success)">${money(totalEarning)}</div><div class="lbl">Total Payout</div></div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
        <div style="text-align:center;padding:10px;background:var(--accentLight);border-radius:10px"><div style="font-weight:700;font-size:20px;color:var(--accent)">${stats.total}</div><div class="muted" style="font-size:11px">Total Orders</div></div>
        <div style="text-align:center;padding:10px;background:#E0F2FE;border-radius:10px"><div style="font-weight:700;font-size:20px;color:#0284C7">${stats.accepted}</div><div class="muted" style="font-size:11px">Accepted</div></div>
        <div style="text-align:center;padding:10px;background:#F3E8FF;border-radius:10px"><div style="font-weight:700;font-size:20px;color:#7C3AED">${stats.pickedUp}</div><div class="muted" style="font-size:11px">Picked Up</div></div>
        <div style="text-align:center;padding:10px;background:#E6F7EE;border-radius:10px"><div style="font-weight:700;font-size:20px;color:var(--success)">${stats.delivered}</div><div class="muted" style="font-size:11px">Delivered</div></div>
      </div>

      <h4 style="margin:0 0 10px;font-family:Poppins;color:var(--accentDark)">Order History (${myOrders.length})</h4>
      ${myOrders.length===0?'<div class="muted">No orders accepted yet.</div>':myOrders.map(o=>`
        <div style="padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer" onclick="routeTo('#/orders/${o.orderId}')">
          <div class="row"><strong style="color:var(--accentDark)">#${escapeHtml(o.orderId)}</strong><span class="del-status-chip ${delStatusClass(o.deliveryStatus||'Accepted')}">${escapeHtml(o.deliveryStatus||'Accepted')}</span></div>
          <div class="row" style="margin-top:4px"><div class="muted" style="font-size:13px">${escapeHtml(o.customer?.name||'')} — ${escapeHtml(o.items?.map(i=>i.name).join(', ')||'')}</div><div style="font-weight:700;color:var(--accentDark)">Payout: ${money(o.deliveryPayout !== undefined ? o.deliveryPayout : (typeof o.items?.[0]?.shipping === 'number' ? o.items[0].shipping : 50))}</div></div>
          <div class="muted" style="font-size:11px">${new Date(o.createdAt).toLocaleString()}</div>
        </div>`).join('')}
      <div style="margin-top:12px"><a class="btn btn-outline btn-sm" href="#/delivery"><i class="fa-solid fa-arrow-left"></i> Back</a></div>
    </div>`;
}

function renderReviews(){
  $("#admin-title").textContent="All Reviews";
  const sorted=[...RATINGS].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  $("#admin-view").innerHTML=`
    <div style="display:flex;flex-direction:column;gap:10px">
    ${sorted.length===0?'<div class="admin-card muted">No reviews yet.</div>':sorted.map(r=>{
      const p=PRODUCTS.find(x=>x.id===r.productId);
      return`<div class="admin-card" data-key="${r.firebaseKey}" style="display:flex;gap:12px;align-items:start;padding:12px">
        ${p?`<img src="${p.imageUrls?.[0]||''}" style="width:48px;height:48px;object-fit:cover;border-radius:10px;border:1px solid var(--line)">`:''}
        <div style="flex:1"><div style="font-weight:700;color:var(--accentDark)">${p?escapeHtml(p.name):'Unknown'}</div><div class="review-stars" style="margin:2px 0">${renderStarIcons(r.rating)}</div>
          ${r.reviewText?`<div style="font-size:13px;color:#444">${escapeHtml(r.reviewText)}</div>`:''}
          <div class="muted" style="font-size:11px">${escapeHtml(r.userName||r.userEmail||'Anonymous')} — ${r.createdAt?new Date(r.createdAt).toLocaleString():''}</div>
        </div>
        <button class="btn btn-sm btn-danger rv-del"><i class="fa-solid fa-trash"></i></button>
      </div>`}).join('')}
    </div>`;
  $$(".rv-del").forEach(btn=>btn.addEventListener("click",(e)=>{const card=e.target.closest("[data-key]");if(confirm("Delete this review?")){db.ref('ratings/'+card.dataset.key).remove().then(()=>toast("Deleted!"))}}));
}

async function compressToDataURL(file,maxW=1200,maxH=1200,quality=.85){const img=await fileToImage(file);const[w,h]=fitRect(img.naturalWidth,img.naturalHeight,maxW,maxH);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);return c.toDataURL("image/jpeg",quality)}
function fitRect(w,h,mW,mH){const r=Math.min(mW/w,mH/h,1);return[Math.round(w*r),Math.round(h*r)]}
function fileToImage(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=fr.result};fr.onerror=rej;fr.readAsDataURL(file)})}

render();
</script>
